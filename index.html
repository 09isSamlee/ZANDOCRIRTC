<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Target System</title>

<style>
body {
    margin: 0;
    background: black;
    color: #00ff9c;
    font-family: monospace;
}

/* LAYOUT */
.container {
    display: flex;
    height: 100vh;
}

/* SIDEBAR */
.sidebar {
    width: 220px;
    background: #031a14;
    padding: 20px;
}

button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    background: black;
    color: #00ff9c;
    border: 1px solid #00ff9c;
    cursor: pointer;
}

/* MAIN */
.main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

/* TARGET AREA */
.targets {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 40px;
}

/* TARGET BOX */
.target-box {
    position: relative;
    text-align: center;
}

.target-box img {
    width: 260px;
    border: 2px solid #00ff9c;
    box-shadow: 0 0 20px #00ff9c55;
}

/* CROSSHAIR */
.target-box::before,
.target-box::after {
    content: "";
    position: absolute;
    border: 1px solid #00ff9c;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
}

.crosshair {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 100%;
    height: 2px;
    background: #00ff9c;
    transform: translate(-50%, -50%);
}

.crosshair::after {
    content: "";
    position: absolute;
    width: 2px;
    height: 100%;
    background: #00ff9c;
    left: 50%;
    top: -50%;
}

/* LABEL */
.label {
    margin-top: 10px;
}

/* TERMINAL */
.terminal {
    background: black;
    padding: 10px;
    height: 150px;
    overflow-y: auto;
}

/* COUNTDOWN */
.count {
    text-align: center;
    font-size: 60px;
    margin: 10px;
}
</style>

</head>

<script>
let run = false;

function log(text){
    const el = document.getElementById("log");
    el.innerHTML += "<br>> " + text;
}

function startSequence(){
    if(run) return;
    run = true;

    let n = 5;
    document.getElementById("count").textContent = n;

    log("Targets locked...");
    log("Starting sequence...");

    const i = setInterval(()=>{
        n--;
        document.getElementById("count").textContent = n;

        if(n === 0){
            clearInterval(i);
            log("Sequence complete ✔");
        }
    },1000);
}
</script>
